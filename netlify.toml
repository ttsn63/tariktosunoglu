[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/"
  to = "/businessplan/index.html"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/businessplan/assets/:splat"
  status = 200

[[redirects]]
  from = "/danke.html"
  to = "/businessplan/danke.html"
  status = 200

[[redirects]]
  from = "/impressum"
  to = "/impressum.html"
  status = 200

[[redirects]]
  from = "/agb"
  to = "/agb.html"
  status = 200

[[redirects]]
  from = "/datenschutz"
  to = "/datenschutz.html"
  status = 200
