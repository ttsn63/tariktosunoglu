<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Danke - Businessplan Express</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #1a1a1a;
        --muted: #666666;
        --line: #e7e7e7;
        --accent: #204e3d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      main {
        width: min(100% - 32px, 680px);
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: clamp(32px, 7vw, 64px);
        text-align: center;
      }

      .icon {
        width: 62px;
        height: 62px;
        margin: 0 auto 28px;
        border: 1px solid var(--accent);
        border-radius: 50%;
        color: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 7vw, 58px);
        line-height: 1.02;
        letter-spacing: -0.06em;
        font-weight: 680;
      }

      p {
        margin: 18px auto 0;
        max-width: 460px;
        color: var(--muted);
        font-size: 18px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        margin-top: 34px;
        padding: 0 18px;
        border: 1px solid var(--accent);
        border-radius: 999px;
        background: var(--accent);
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon" aria-hidden="true">✓</div>
      <h1>Vielen Dank für deine Anfrage.</h1>
      <p>
        Wir melden uns innerhalb von 24 Stunden bei dir. Bitte prüfe auch deinen
        Spam-Ordner.
      </p>
      <a href="index.html">Zurück zur Startseite</a>
    </main>
  </body>
</html>
